<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Management</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050816;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  border-bottom:1px solid #111;
}

.logo{
  color:#FFD700;
  font-weight:bold;
  font-size:18px;
}

.menu{
  display:flex;
  gap:20px;
}

.menu div{
  cursor:pointer;
  opacity:.6;
}

.menu .active{
  opacity:1;
  border-bottom:2px solid #FFD700;
}

/* TOP BUTTONS */
.top-buttons{
  display:flex;
  gap:10px;
  padding:15px 25px;
}

.top-buttons button{
  background:#111827;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}

.top-buttons .active{
  background:#2563eb;
}

/* KPIs */
.kpis{
  display:flex;
  gap:15px;
  padding:0 25px;
}

.card{
  flex:1;
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  border-bottom:3px solid #1e293b;
}

.card h4{
  margin:0;
  font-size:11px;
  opacity:.6;
}

.card h2{
  margin:5px 0;
}

.bad{color:#ff3b3b;}
.good{color:#00ff9c;}

/* CHARTS */
.charts{
  display:flex;
  gap:20px;
  padding:20px 25px;
}

.chart-box{
  flex:1;
  background:#0f172a;
  padding:15px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">CATEGORY MANAGEMENT</div>
  <div class="menu">
    <div class="active">Dashboard</div>
    <div>PDV</div>
    <div>Segmentos</div>
  </div>
</div>

<div class="top-buttons">
  <button class="active">HOGAR</button>
  <button>AUTOS</button>
  <button>TOTAL</button>
</div>

<div class="kpis">
  <div class="card">
    <h4>VALOR AÑO ACTUAL</h4>
    <h2 id="val">$0</h2>
  </div>

  <div class="card">
    <h4>VAR% VALOR</h4>
    <h2 id="var">0%</h2>
  </div>

  <div class="card">
    <h4>UNIDADES</h4>
    <h2 id="units">0</h2>
  </div>

  <div class="card">
    <h4>SEGMENTOS</h4>
    <h2 id="seg">0</h2>
  </div>
</div>

<div class="charts">
  <div class="chart-box">
    <canvas id="chartValor"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="chartUnits"></canvas>
  </div>
</div>

<script>

let d25=[], d26=[];

async function load(){

  d25 = await (await fetch('resumen_2025.json?v='+Date.now())).json();
  d26 = await (await fetch('resumen_2026.json?v='+Date.now())).json();

  let t25=0,t26=0,u=0;
  let segSet = new Set();

  d25.forEach(x=> t25+=x.VENTA||0);
  d26.forEach(x=>{
    t26+=x.VENTA||0;
    u+=x.UNIDADES||0;
    segSet.add(x.SEGMENTO);
  });

  let growth = ((t26-t25)/t25)*100;

  document.getElementById('val').innerText = '$'+Math.round(t26).toLocaleString();
  document.getElementById('units').innerText = Math.round(u/1000)+'K';
  document.getElementById('seg').innerText = segSet.size;

  let g = document.getElementById('var');
  g.innerText = growth.toFixed(1)+'%';
  g.className = growth>=0?'good':'bad';

  buildCharts();

}

function buildCharts(){

  let meses = ["ene","feb","mar","abr"];
  let v25=[],v26=[],u25=[],u26=[];

  meses.forEach(m=>{
    let t25=0,t26=0,uu25=0,uu26=0;

    d25.forEach(x=>{
      if(x.MES===m){
        t25+=x.VENTA||0;
        uu25+=x.UNIDADES||0;
      }
    });

    d26.forEach(x=>{
      if(x.MES===m){
        t26+=x.VENTA||0;
        uu26+=x.UNIDADES||0;
      }
    });

    v25.push(t25);
    v26.push(t26);
    u25.push(uu25);
    u26.push(uu26);
  });

  new Chart(document.getElementById('chartValor'),{
    type:'line',
    data:{
      labels:["Ene","Feb","Mar","Abr"],
      datasets:[
        {label:'2025', data:v25, borderColor:'#ff3b3b'},
        {label:'2026', data:v26, borderColor:'#3b82f6'}
      ]
    }
  });

  new Chart(document.getElementById('chartUnits'),{
    type:'line',
    data:{
      labels:["Ene","Feb","Mar","Abr"],
      datasets:[
        {label:'2025', data:u25, borderColor:'#ff3b3b'},
        {label:'2026', data:u26, borderColor:'#3b82f6'}
      ]
    }
  });

}

load();

</script>

</body>
</html>
