<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Category Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#070b1a;
    color:white;
}
h1{
    text-align:center;
    color:#FFD700;
    margin-top:30px;
}

.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

.kpis{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:30px;
}

.card{
    background:#11182d;
    padding:20px;
    border-radius:12px;
    width:250px;
    text-align:center;
}

.ok{color:#00ff9c;}
.bad{color:#ff4d4d;}

#status{
    margin-top:20px;
    text-align:center;
    color:#00ff9c;
}
</style>
</head>

<body>

<h1>CATEGORY MANAGEMENT</h1>

<div class="container">

<div id="status">Cargando datos...</div>

<div class="kpis">
    <div class="card">
        <h3>Venta 2025</h3>
        <div id="v2025">$0</div>
    </div>
    <div class="card">
        <h3>Venta 2026</h3>
        <div id="v2026">$0</div>
    </div>
    <div class="card">
        <h3>Crecimiento</h3>
        <div id="growth">0%</div>
    </div>
</div>

</div>

<script>

// 🔥 Función inteligente para detectar el valor correcto
function getValor(obj){
    return obj.VALOR 
        || obj.valor 
        || obj.venta 
        || obj.sales 
        || obj.total 
        || obj.VALOR_AÑO_ACTUAL
        || obj.VALOR_ANO_ACTUAL
        || obj.valor_actual
        || 0;
}

// 🔥 Formato dinero
function format(num){
    return '$' + num.toLocaleString();
}

// 🔥 Carga principal
async function cargarDatos(){

    try{

        const r2025 = await fetch('resumen_2025.json');
        const r2026 = await fetch('resumen_2026.json');

        const d2025 = await r2025.json();
        const d2026 = await r2026.json();

        let total2025 = 0;
        let total2026 = 0;

        d2025.forEach(x => total2025 += getValor(x));
        d2026.forEach(x => total2026 += getValor(x));

        document.getElementById('v2025').innerText = format(total2025);
        document.getElementById('v2026').innerText = format(total2026);

        let growth = total2025 === 0 
            ? 0 
            : ((total2026 - total2025) / total2025) * 100;

        let el = document.getElementById('growth');
        el.innerText = growth.toFixed(1) + '%';
        el.className = growth >= 0 ? 'ok' : 'bad';

        document.getElementById('status').innerText = "Dashboard listo 🚀";

        console.log("Datos cargados OK", {
            total2025,
            total2026
        });

    }catch(e){
        document.getElementById('status').innerText = "Error cargando JSON";
        console.error(e);
    }

}

cargarDatos();

</script>

</body>
</html>
