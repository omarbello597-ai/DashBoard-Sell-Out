<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Management</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070b17;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  border-bottom:1px solid #111;
}

.logo{
  color:#FFD700;
  font-weight:bold;
}

.menu{
  display:flex;
  gap:20px;
}

.menu div{
  cursor:pointer;
  opacity:.7;
}

.menu .active{
  opacity:1;
  border-bottom:2px solid #FFD700;
}

/* FILTROS */
.filters{
  padding:20px 30px;
}

.months button{
  background:#111827;
  border:none;
  color:white;
  padding:6px 12px;
  margin-right:5px;
  border-radius:6px;
  cursor:pointer;
}

.months .active{
  background:#FFD700;
  color:black;
}

/* KPIs */
.kpis{
  display:flex;
  gap:20px;
  padding:20px 30px;
}

.card{
  flex:1;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

.title{
  font-size:12px;
  opacity:.6;
}

.value{
  font-size:24px;
  margin-top:10px;
}

.bad{color:#ff3b3b;}
.good{color:#00ff9c;}

/* CHART */
.chart{
  padding:30px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">CATEGORY MANAGEMENT</div>
  <div class="menu">
    <div class="active">Dashboard</div>
    <div>PDV</div>
    <div>Segmentos</div>
  </div>
</div>

<!-- FILTROS -->
<div class="filters">
  <div class="months">
    <button class="active">Ene</button>
    <button class="active">Feb</button>
    <button class="active">Mar</button>
    <button class="active">Abr</button>
  </div>
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="card">
    <div class="title">VALOR AÑO ACTUAL</div>
    <div id="v2026" class="value">$0</div>
  </div>

  <div class="card">
    <div class="title">VAR% VALOR</div>
    <div id="growth" class="value">0%</div>
  </div>

  <div class="card">
    <div class="title">UNIDADES</div>
    <div id="units" class="value">0</div>
  </div>
</div>

<!-- CHART -->
<div class="chart">
  <canvas id="chart"></canvas>
</div>

<script>

let data25 = [];
let data26 = [];

function formatMoney(n){
  return '$' + Math.round(n).toLocaleString();
}

async function loadData(){

  const r25 = await fetch('resumen_2025.json?v=' + Date.now());
  const r26 = await fetch('resumen_2026.json?v=' + Date.now());

  data25 = await r25.json();
  data26 = await r26.json();

  let total25 = 0;
  let total26 = 0;
  let units = 0;

  data25.forEach(x=> total25 += x.VENTA || 0);
  data26.forEach(x=>{
    total26 += x.VENTA || 0;
    units += x.UNIDADES || 0;
  });

  const growth = ((total26-total25)/total25)*100;

  document.getElementById('v2026').innerText = formatMoney(total26);

  const g = document.getElementById('growth');
  g.innerText = growth.toFixed(1)+'%';
  g.className = "value " + (growth>=0 ? "good" : "bad");

  document.getElementById('units').innerText =
    Math.round(units/1000) + 'K';

  buildChart();

}

function buildChart(){

  let meses = ["ene","feb","mar","abr"];
  let v25 = [];
  let v26 = [];

  meses.forEach(m=>{
    let t25 = 0;
    let t26 = 0;

    data25.forEach(x=>{
      if(x.MES === m) t25 += x.VENTA || 0;
    });

    data26.forEach(x=>{
      if(x.MES === m) t26 += x.VENTA || 0;
    });

    v25.push(t25);
    v26.push(t26);
  });

  new Chart(document.getElementById('chart'), {
    type:'line',
    data:{
      labels:["Ene","Feb","Mar","Abr"],
      datasets:[
        {label:"2025", data:v25, borderColor:"#ff3b3b"},
        {label:"2026", data:v26, borderColor:"#3b82f6"}
      ]
    },
    options:{
      plugins:{legend:{labels:{color:'white'}}},
      scales:{
        x:{ticks:{color:'white'}},
        y:{ticks:{color:'white'}}
      }
    }
  });

}

loadData();

</script>

</body>
</html>
