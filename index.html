<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Management</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#08080f;
  color:#d4d4e8;
}

h1{
  text-align:center;
  color:#F5C800;
  margin-top:30px;
}

.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.kpis{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:30px;
}

.card{
  background:#16161f;
  border:1px solid #1e1e2c;
  padding:20px;
  border-radius:12px;
  width:250px;
  text-align:center;
}

.ok{color:#0DB75B;}
.bad{color:#E5192C;}

#status{
  text-align:center;
  margin-top:20px;
  color:#0DB75B;
}
</style>
</head>

<body>

<h1>CATEGORY MANAGEMENT</h1>

<div class="container">

<div id="status">Cargando datos...</div>

<div class="kpis">
  <div class="card">
    <h3>Venta 2025</h3>
    <div id="v2025">$0</div>
  </div>
  <div class="card">
    <h3>Venta 2026</h3>
    <div id="v2026">$0</div>
  </div>
  <div class="card">
    <h3>Crecimiento</h3>
    <div id="growth">0%</div>
  </div>
</div>

<h2 style="text-align:center;margin-top:40px;">Ventas por Categoría (2026)</h2>
<canvas id="chartCategorias"></canvas>

</div>

<script>

let DATA = null;

function format(num){
  return '$' + Math.round(num).toLocaleString();
}

function agruparCategoria(data){
  let map = {};
  data.forEach(x=>{
    let cat = x.CATEGORIA || "OTROS";
    map[cat] = (map[cat] || 0) + (x.VENTA || 0);
  });
  return map;
}

async function loadData(){

  try{

    const r25 = await fetch('resumen_2025.json?v=' + Date.now());
    const r26 = await fetch('resumen_2026.json?v=' + Date.now());

    const d25 = await r25.json();
    const d26 = await r26.json();

    let total25 = 0;
    let total26 = 0;

    d25.forEach(x => total25 += x.VENTA || 0);
    d26.forEach(x => total26 += x.VENTA || 0);

    document.getElementById('v2025').innerText = format(total25);
    document.getElementById('v2026').innerText = format(total26);

    let growth = total25 === 0 ? 0 : ((total26-total25)/total25)*100;

    let g = document.getElementById('growth');
    g.innerText = growth.toFixed(1) + '%';
    g.className = growth >= 0 ? 'ok' : 'bad';

    document.getElementById('status').innerText = "Dashboard listo 🚀";

    const dataCat = agruparCategoria(d26);

    new Chart(document.getElementById('chartCategorias'), {
      type: 'bar',
      data: {
        labels: Object.keys(dataCat),
        datasets: [{
          label: 'Ventas 2026',
          data: Object.values(dataCat)
        }]
      },
      options:{
        plugins:{
          legend:{labels:{color:'white'}}
        },
        scales:{
          x:{ticks:{color:'white'}},
          y:{ticks:{color:'white'}}
        }
      }
    });

    DATA = {d25,d26};

  }catch(e){
    console.error(e);
    document.getElementById('status').innerText = "Error cargando datos";
  }

}

loadData();

</script>

</body>
</html>
