<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Management · Sell Out</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#08080f;--surf:#111119;--card:#16161f;--border:#1e1e2c;
  --acc:#F5C800;--blue:#1A3FA3;--pos:#0DB75B;--neg:#E5192C;
  --posL:#0a2e1a;--negL:#2e0a0a;
  --white:#fff;--muted:#5a5a7a;--text:#d4d4e8;--sub:#8888aa;
  --ff:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:13px;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
.ld-brand{font-family:var(--ff);font-size:48px;color:var(--acc);letter-spacing:4px;}
.ld-sub{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.ld-bar{width:280px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:var(--acc);border-radius:2px;width:0%;transition:width .3s;}
.ld-msg{font-family:var(--fm);font-size:10px;color:var(--muted);min-height:18px;}

/* ── NAV ── */
nav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:10px;height:48px;flex-shrink:0;z-index:50;}
.brand{font-family:var(--ff);font-size:18px;color:var(--acc);letter-spacing:2px;white-space:nowrap;}
.nav-sep{width:1px;height:20px;background:var(--border);}
.main-tabs{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px;}
.main-tab{padding:5px 14px;border-radius:4px;font-family:var(--fm);font-size:10px;letter-spacing:1px;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.main-tab:hover{color:var(--text);}
.main-tab.active{background:var(--card);color:var(--white);border:1px solid var(--border);}
.cat-pills{display:flex;gap:3px;}
.cat-pill{padding:4px 12px;border-radius:20px;font-family:var(--fm);font-size:9px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .15s;white-space:nowrap;}
.cat-pill:hover{border-color:var(--acc);color:var(--acc);}
.cat-pill.active{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700;}
.cat-pill.active.hogar{background:var(--blue);color:#fff;border-color:var(--blue);}
.cat-pill.active.ferreteria{background:#9b59b6;color:#fff;border-color:#9b59b6;}
.cat-pill.active.total{background:#444;color:#fff;border-color:#555;}
.badge{font-family:var(--fm);font-size:9px;padding:3px 9px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--sub);white-space:nowrap;}

/* ── MESES BAR ── */
#mes-bar{background:var(--surf);border-bottom:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:nowrap;}
.mes-btn{padding:3px 9px;min-width:32px;border-radius:5px;font-family:var(--fm);font-size:9px;cursor:pointer;border:1px solid #333;background:transparent;color:#888;font-weight:400;transition:all .15s;}
.mes-btn.active{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700;}
.mes-btn:disabled{opacity:.25;cursor:not-allowed;}
.flabel{font-family:var(--fm);font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:5px;cursor:pointer;font-family:var(--fm);font-size:9px;letter-spacing:1px;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn.red:hover{border-color:var(--neg);color:var(--neg);}

/* ── PAGES ── */
.page{display:none;flex:1;flex-direction:column;min-height:0;}
.page.active{display:flex;}

/* ── DASHBOARD ── */
.d-filters{background:var(--surf);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.d-body{flex:1;padding:14px;display:grid;gap:10px;grid-template-columns:1fr;overflow-y:auto;}

.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px 14px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--acc);}
.kpi-card.neg::after{background:var(--neg);}
.kpi-card.inv::after{background:#0DB75B;}
.kpi-label{font-family:var(--fm);font-size:7.5px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.kpi-val{font-family:var(--ff);font-size:24px;letter-spacing:.5px;line-height:1;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── TREND CHARTS ROW ── */
.trend-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px 14px;display:flex;flex-direction:column;}
.cbox-label{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;flex-shrink:0;}
.cbox canvas{flex:1;min-height:140px;}

/* ── SEGMENT TABLE ── */
.seg-wrap{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.seg-hdr{padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.seg-hdr-title{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.seg-table{width:100%;border-collapse:collapse;}
.seg-table th{background:var(--surf);color:var(--acc);font-family:var(--fm);font-size:7.5px;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
.seg-table th:hover{color:var(--white);}
.seg-table td{padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px;vertical-align:middle;}
.seg-table tr:hover td{background:rgba(255,255,255,.02);}
.seg-table tr.nr td{background:rgba(229,25,44,.04);}
.seg-table tr.nr td:first-child{border-left:2px solid var(--neg);}
.pill{display:inline-block;padding:1px 7px;border-radius:3px;font-family:var(--fm);font-size:9.5px;}
.pill.pos{background:var(--posL);color:var(--pos);border:1px solid rgba(13,183,91,.2);}
.pill.neg{background:var(--negL);color:var(--neg);border:1px solid rgba(229,25,44,.2);}
.mono{font-family:var(--fm);}

/* ── KSTRIP ── */
.kstrip{display:flex;gap:1px;background:var(--border);flex-shrink:0;}
.ks-item{flex:1;background:var(--surf);padding:5px 8px;text-align:center;min-width:0;}
.ks-label{font-family:var(--fm);font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:1px;}
.ks-val{font-family:var(--ff);font-size:16px;letter-spacing:.5px;}
.ks-val.pos{color:var(--pos);}
.ks-val.neg{color:var(--neg);}
.ks-val.acc{color:var(--acc);}

/* ── SEGMENTOS PAGE ── */
.s-body{flex:1;display:flex;min-height:0;}
.s-left{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.s-right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.p-hdr{padding:6px 10px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.p-hdr-title{font-family:var(--ff);font-size:12px;letter-spacing:1px;color:var(--white);}
.seg-list{flex:1;overflow-y:auto;}
.seg-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .1s;}
.seg-row:hover{background:rgba(255,255,255,.03);}
.seg-row.sel{background:rgba(245,200,0,.07);border-left:3px solid var(--acc);}
.seg-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.seg-v26{font-family:var(--fm);font-size:10px;color:var(--white);font-weight:600;width:60px;text-align:right;flex-shrink:0;}
.seg-var{font-family:var(--fm);font-size:10px;font-weight:600;width:50px;text-align:right;flex-shrink:0;}
.seg-var.pos{color:var(--pos);}
.seg-var.neg{color:var(--neg);}
.r-hdr{padding:7px 14px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.r-title{font-family:var(--ff);font-size:13px;letter-spacing:1px;color:var(--white);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbl-panel{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead{position:sticky;top:0;z-index:5;}
th{background:var(--surf);color:var(--acc);font-family:var(--fm);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--white);}
td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.nr td{background:rgba(229,25,44,.04);}
tr.nr td:first-child{border-left:2px solid var(--neg);}

/* ── DDI badge ── */
.ddi{font-family:var(--fm);font-size:10px;font-weight:700;}
.ddi.ok{color:#0DB75B;}
.ddi.warn{color:#F5C800;}
.ddi.crit{color:#E5192C;}
.ddi.na{color:var(--muted);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="ld-brand">Category Management</div>
  <div class="ld-sub">Cargando datos · Sell Out 2025 – 2026</div>
  <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
  <div class="ld-msg" id="ld-msg">Iniciando…</div>
</div>

<!-- APP -->
<div id="app" style="display:none;min-height:100vh;flex-direction:column;display:none;">

  <!-- NAV -->
  <nav>
    <div class="brand">Category Management</div>
    <div class="nav-sep"></div>
    <div class="main-tabs">
      <div class="main-tab active" onclick="showPage('dashboard',this)">📊 DASHBOARD</div>
      <div class="main-tab"        onclick="showPage('segmentos',this)">📦 SEGMENTOS</div>
    </div>
    <div class="nav-sep"></div>
    <div class="cat-pills">
      <div class="cat-pill active"       onclick="setCat('AUTOS',this)">🚗 AUTOS</div>
      <div class="cat-pill hogar"        onclick="setCat('HOGAR',this)">🏠 HOGAR</div>
      <div class="cat-pill ferreteria"   onclick="setCat('FERRETERIA',this)">🔧 FERRETERÍA</div>
      <div class="cat-pill total"        onclick="setCat('TOTAL',this)">🌐 TOTAL</div>
    </div>
    <div style="flex:1"></div>
    <div class="badge" id="data-badge">—</div>
  </nav>

  <!-- MESES BAR -->
  <div id="mes-bar">
    <span class="flabel">Meses</span>
    <div id="mes-wrap" style="display:flex;gap:3px;flex:1;flex-wrap:nowrap;"></div>
    <button class="btn" onclick="selAllMeses()">✓ TODOS</button>
    <button class="btn red" onclick="clearMeses()">✕ LIMPIAR</button>
  </div>

  <!-- PAGE: DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="d-filters">
      <span class="flabel">Vista</span>
      <div class="badge" id="d-periodo">—</div>
    </div>
    <div class="d-body" id="d-body"></div>
  </div>

  <!-- PAGE: SEGMENTOS -->
  <div class="page" id="page-segmentos">
    <div class="kstrip" id="s-kstrip"></div>
    <div class="s-body">
      <div class="s-left">
        <div class="p-hdr">
          <span class="p-hdr-title">SEGMENTOS</span>
          <span style="font-family:var(--fm);font-size:7.5px;color:var(--muted)" id="s-count">—</span>
        </div>
        <div class="seg-list" id="s-seg-list"></div>
      </div>
      <div class="s-right">
        <div class="r-hdr">
          <span class="r-title" id="s-r-title">Selecciona un segmento</span>
          <div id="s-r-kpis" style="display:flex;gap:10px;font-family:var(--fm);font-size:9px;color:var(--sub);"></div>
        </div>
        <div class="tbl-panel" id="s-tbl">
          <div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--fm);font-size:9px;letter-spacing:2px;">
            SELECCIONA UN SEGMENTO
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS & HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const MES_ORD=['ene.','feb.','mar.','abr.','may.','jun.','jul.','ago.','sep.','oct.','nov.','dic.'];
const MES_LABEL={
  'ene.':'Ene','feb.':'Feb','mar.':'Mar','abr.':'Abr',
  'may.':'May','jun.':'Jun','jul.':'Jul','ago.':'Ago',
  'sep.':'Sep','oct.':'Oct','nov.':'Nov','dic.':'Dic'
};

const r1=n=>Math.round(n*10)/10;
const r0=n=>Math.round(n);
const sg=v=>v>=0?'+':'';
const sp=(a,b)=>b>0&&isFinite(a/b)?Math.round((a/b-1)*1000)/10:0;
const fmtM=v=>{const a=Math.abs(v),s=v<0?'-':'';return a>=1e9?s+'$'+(a/1e9).toFixed(1)+'B':a>=1e6?s+'$'+(a/1e6).toFixed(1)+'M':s+'$'+r0(a/1e3)+'K';};
const fmtK=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':r0(v)+'';
const ddiColor=d=>d===null||d===undefined?'na':d<30?'crit':d<60?'warn':'ok';
const ddiLabel=d=>d===null||d===undefined?'—':r0(d)+'d';

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let D25=[], D26=[];          // raw JSON rows
let CUR_CAT='AUTOS';
let CUR_PAGE='dashboard';
let selMeses=new Set();      // empty = all
let selSeg=null;
let chartV=null, chartU=null;
let dCharts={};

// ─────────────────────────────────────────────────────────────────────────────
// LOAD DATA
// ─────────────────────────────────────────────────────────────────────────────
async function safeJson(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`No se encontró el archivo: ${url.split('?')[0]} (HTTP ${res.status})`);
  const text = await res.text();
  if(text.trim().startsWith('<'))
    throw new Error(`El archivo ${url.split('?')[0]} devolvió HTML en lugar de JSON. Verifica que el archivo exista en el repositorio.`);
  return JSON.parse(text);
}

async function load(){
  const fill=document.getElementById('ld-fill');
  const msg=document.getElementById('ld-msg');

  try{
    msg.textContent='Cargando resumen 2025…'; fill.style.width='20%';
    try{
      D25 = await safeJson('resumen_2025.json?v='+Date.now());
    }catch(e){
      console.warn('resumen_2025.json no disponible, continuando sin datos 2025:', e.message);
      D25 = [];
    }

    msg.textContent='Cargando resumen 2026…'; fill.style.width='55%';
    D26 = await safeJson('resumen_2026.json?v='+Date.now());

    msg.textContent='Procesando datos…'; fill.style.width='90%';

    // Build meses from data
    const mesesDisp=MES_ORD.filter(m=>D26.some(r=>r.MES===m));
    buildMesButtons(mesesDisp);
    selMeses=new Set(mesesDisp); // all active by default

    const rows26=D26.length+D25.length;
    document.getElementById('data-badge').textContent=rows26.toLocaleString()+' filas';

    fill.style.width='100%';
    await new Promise(r=>setTimeout(r,300));
    document.getElementById('loading-screen').style.display='none';
    const app=document.getElementById('app');
    app.style.display='flex';
    app.style.flexDirection='column';

    renderDashboard();

  }catch(e){
    const ldMsg=document.getElementById('ld-msg');
    ldMsg.style.cssText='color:#E5192C;max-width:460px;text-align:center;line-height:1.7;font-size:11px;';
    ldMsg.textContent='❌ '+e.message;
    document.getElementById('ld-fill').style.background='#E5192C';
    console.error(e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// MESES BUTTONS
// ─────────────────────────────────────────────────────────────────────────────
function buildMesButtons(meses){
  const wrap=document.getElementById('mes-wrap');
  wrap.innerHTML='';
  MES_ORD.forEach(m=>{
    const has=meses.includes(m);
    const btn=document.createElement('button');
    btn.textContent=MES_LABEL[m]||m;
    btn.className='mes-btn'+(has&&selMeses.has(m)?' active':'');
    btn.disabled=!has;
    btn.dataset.mes=m;
    if(has) btn.addEventListener('click',function(){
      this.classList.toggle('active');
      if(this.classList.contains('active')) selMeses.add(m);
      else selMeses.delete(m);
      refreshAll();
    });
    wrap.appendChild(btn);
  });
}
function selAllMeses(){
  document.querySelectorAll('.mes-btn').forEach(b=>{
    if(!b.disabled){b.classList.add('active');selMeses.add(b.dataset.mes);}
  });
  refreshAll();
}
function clearMeses(){
  document.querySelectorAll('.mes-btn').forEach(b=>{
    b.classList.remove('active');
  });
  selMeses.clear();
  refreshAll();
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function filterRows(arr){
  return arr.filter(r=>{
    if(CUR_CAT!=='TOTAL'&&r.CATEGORIA!==CUR_CAT) return false;
    if(selMeses.size>0&&!selMeses.has(r.MES)) return false;
    return true;
  });
}

function getSegs(){
  const rows26=filterRows(D26);
  const rows25=filterRows(D25);
  const map={};
  rows26.forEach(r=>{
    if(!map[r.SEGMENTO]) map[r.SEGMENTO]={seg:r.SEGMENTO,v26:0,u26:0,inv:0};
    map[r.SEGMENTO].v26+=r.VENTA||0;
    map[r.SEGMENTO].u26+=r.UNIDADES||0;
    map[r.SEGMENTO].inv+=r.INVENTARIO||0;
  });
  rows25.forEach(r=>{
    if(!map[r.SEGMENTO]) map[r.SEGMENTO]={seg:r.SEGMENTO,v26:0,u26:0,inv:0};
    if(!map[r.SEGMENTO].v25) map[r.SEGMENTO].v25=0;
    if(!map[r.SEGMENTO].u25) map[r.SEGMENTO].u25=0;
    map[r.SEGMENTO].v25=(map[r.SEGMENTO].v25||0)+(r.VENTA||0);
    map[r.SEGMENTO].u25=(map[r.SEGMENTO].u25||0)+(r.UNIDADES||0);
  });
  return Object.values(map).map(s=>({
    ...s,
    v25:s.v25||0, u25:s.u25||0,
    var:sp(s.v26,s.v25||1),
    varu:sp(s.u26,s.u25||1),
    ddi: s.u26>0 ? calcDDI(s.inv,s.u26) : null,
  })).sort((a,b)=>b.v26-a.v26);
}

function getTrend(){
  const meses=MES_ORD.filter(m=>D26.some(r=>r.MES===m));
  return meses.map(m=>{
    const rows26=D26.filter(r=>r.MES===m&&(CUR_CAT==='TOTAL'||r.CATEGORIA===CUR_CAT));
    const rows25=D25.filter(r=>r.MES===m&&(CUR_CAT==='TOTAL'||r.CATEGORIA===CUR_CAT));
    return{
      mes:MES_LABEL[m]||m,
      v26:rows26.reduce((s,r)=>s+(r.VENTA||0),0)/1e6,
      v25:rows25.reduce((s,r)=>s+(r.VENTA||0),0)/1e6,
      u26:rows26.reduce((s,r)=>s+(r.UNIDADES||0),0)/1e3,
      u25:rows25.reduce((s,r)=>s+(r.UNIDADES||0),0)/1e3,
    };
  });
}

function calcDDI(inv, units){
  const days= selMeses.size>0 ? selMeses.size*30 : 120;
  if(!units||units<=0) return null;
  return Math.round(inv/(units/days));
}

function getTotals(){
  const r26=filterRows(D26), r25=filterRows(D25);
  const v26=r26.reduce((s,r)=>s+(r.VENTA||0),0);
  const v25=r25.reduce((s,r)=>s+(r.VENTA||0),0);
  const u26=r26.reduce((s,r)=>s+(r.UNIDADES||0),0);
  const u25=r25.reduce((s,r)=>s+(r.UNIDADES||0),0);
  const inv=r26.reduce((s,r)=>s+(r.INVENTARIO||0),0);
  return{v26,v25,u26,u25,inv,
    varV:sp(v26,v25||1),varU:sp(u26,u25||1),
    ddi: u26>0?calcDDI(inv,u26):null,
    segs:[...new Set(r26.map(r=>r.SEGMENTO))].length,
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────────────────────────────────────
function showPage(page,el){
  CUR_PAGE=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  if(page==='dashboard') renderDashboard();
  else if(page==='segmentos') renderSegmentos();
}

function setCat(cat,el){
  CUR_CAT=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  if(el) el.classList.add('active');
  selSeg=null;
  refreshAll();
}

function refreshAll(){
  if(CUR_PAGE==='dashboard') renderDashboard();
  else if(CUR_PAGE==='segmentos') renderSegmentos();
}

const accentColor=()=>CUR_CAT==='HOGAR'?'#6699ff':CUR_CAT==='FERRETERIA'?'#c084fc':CUR_CAT==='TOTAL'?'#aaa':'#F5C800';

// ─────────────────────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
function renderDashboard(){
  const t=getTotals();
  const ac=accentColor();
  const segs=getSegs();
  const trend=getTrend();
  const mLabel=selMeses.size===0?'Acumulado':
    MES_ORD.filter(m=>selMeses.has(m)).map(m=>MES_LABEL[m]).join(', ');
  document.getElementById('d-periodo').textContent=mLabel;

  // KPI cards
  const kpis=[
    {label:'Valor Año Actual', val:fmtM(t.v26), sub:'Ant: '+fmtM(t.v25), neg:t.varV<0},
    {label:'VAR% Valor', val:sg(t.varV)+t.varV.toFixed(1)+'%', sub:'Dif: '+sg(t.v26-t.v25)+fmtM(t.v26-t.v25), neg:t.varV<0, color:t.varV>=0?'var(--pos)':'var(--neg)'},
    {label:'Unidades Actual', val:fmtK(t.u26), sub:'Ant: '+fmtK(t.u25), neg:false},
    {label:'VAR% Unds', val:sg(t.varU)+t.varU.toFixed(1)+'%', sub:'Dif: '+sg(t.u26-t.u25)+fmtK(Math.abs(t.u26-t.u25)), neg:t.varU<0, color:t.varU>=0?'var(--pos)':'var(--neg)'},
    {label:'Segmentos', val:t.segs, sub:segs.filter(s=>s.var<0).length+' en caída', neg:false},
    {label:'DDI Promedio', val:ddiLabel(t.ddi), sub:'Stock: '+fmtM(t.inv), neg:false, color:t.ddi===null?'var(--muted)':t.ddi<30?'var(--neg)':t.ddi<60?'#F5C800':'var(--pos)', extraClass:'inv'},
  ];

  const kpiHTML='<div class="kpi-row">'+kpis.map(k=>{
    const c=k.color||ac;
    return`<div class="kpi-card${k.neg?' neg':''}${k.extraClass?' '+k.extraClass:''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val" style="color:${c}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`;
  }).join('')+'</div>';

  // Trend charts containers
  const trendsHTML=`<div class="trend-row">
    <div class="cbox"><div class="cbox-label">📈 TENDENCIA VALOR ($M)</div><div style="position:relative;height:150px"><canvas id="d-cv"></canvas></div></div>
    <div class="cbox"><div class="cbox-label">📦 TENDENCIA UNIDADES (K)</div><div style="position:relative;height:150px"><canvas id="d-cu"></canvas></div></div>
  </div>`;

  // Segment summary table
  const segRows=segs.map((s,i)=>{
    const isN=s.var<-5;
    const ddiCls=ddiColor(s.ddi);
    return`<tr class="${isN?'nr':''}">
      <td class="mono" style="color:var(--muted);font-size:9px">${i+1}</td>
      <td style="font-weight:${isN?600:400};color:${isN?'var(--neg)':'var(--text)'}" title="${s.seg}">${s.seg}</td>
      <td class="mono" style="text-align:right;font-weight:700;color:${ac}">${fmtM(s.v26)}</td>
      <td class="mono" style="text-align:right;color:var(--muted)">${fmtM(s.v25)}</td>
      <td style="text-align:center"><span class="pill ${s.var>=0?'pos':'neg'}">${sg(s.var)}${s.var.toFixed(1)}%</span></td>
      <td class="mono" style="text-align:right;color:var(--sub)">${fmtK(s.u26)}</td>
      <td style="text-align:center"><span class="pill ${s.varu>=0?'pos':'neg'}">${sg(s.varu)}${s.varu.toFixed(1)}%</span></td>
      <td style="text-align:center"><span class="ddi ${ddiCls}">${ddiLabel(s.ddi)}</span></td>
    </tr>`;
  }).join('');

  const tableHTML=`<div class="seg-wrap">
    <div class="seg-hdr">
      <span class="seg-hdr-title">🗂 RESUMEN POR SEGMENTO · ${mLabel}</span>
      <span class="badge">${segs.length} segmentos</span>
    </div>
    <div style="overflow-x:auto">
      <table class="seg-table">
        <thead><tr>
          <th style="width:26px">#</th>
          <th style="width:200px">SEGMENTO</th>
          <th style="text-align:right">VALOR 2026</th>
          <th style="text-align:right">VALOR 2025</th>
          <th style="text-align:center">VAR%</th>
          <th style="text-align:right">UNDS 2026</th>
          <th style="text-align:center">VAR% U</th>
          <th style="text-align:center">DDI</th>
        </tr></thead>
        <tbody>${segRows}</tbody>
      </table>
    </div>
  </div>`;

  document.getElementById('d-body').innerHTML=kpiHTML+trendsHTML+tableHTML;

  // Build charts after DOM ready
  setTimeout(()=>buildDCharts(trend,ac),0);
}

function buildDCharts(trend,ac){
  const c26=ac, c25='rgba(229,25,44,.8)';
  const baseOpts={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{color:'#8888aa',font:{size:9},boxWidth:10,padding:6}},
      tooltip:{backgroundColor:'#16161f',borderColor:'#1e1e2c',borderWidth:1}},
    scales:{
      x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a5a7a',font:{size:9}}},
      y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a5a7a',font:{size:9}}}
    }
  };

  const ctxV=document.getElementById('d-cv')?.getContext('2d');
  if(ctxV){
    if(dCharts.v) dCharts.v.destroy();
    dCharts.v=new Chart(ctxV,{type:'line',data:{
      labels:trend.map(t=>t.mes),
      datasets:[
        {label:'2025',data:trend.map(t=>r1(t.v25)),borderColor:c25,backgroundColor:'rgba(229,25,44,.07)',borderWidth:1.5,pointRadius:3,fill:true,tension:.3,spanGaps:true},
        {label:'2026',data:trend.map(t=>r1(t.v26)),borderColor:c26,backgroundColor:CUR_CAT==='HOGAR'?'rgba(102,153,255,.07)':'rgba(245,200,0,.07)',borderWidth:2,pointRadius:3,fill:true,tension:.3,spanGaps:true}
      ]
    },options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,ticks:{...baseOpts.scales.y.ticks,callback:v=>'$'+v+'M'}}}}});
  }

  const ctxU=document.getElementById('d-cu')?.getContext('2d');
  if(ctxU){
    if(dCharts.u) dCharts.u.destroy();
    dCharts.u=new Chart(ctxU,{type:'line',data:{
      labels:trend.map(t=>t.mes),
      datasets:[
        {label:'2025',data:trend.map(t=>r1(t.u25)),borderColor:c25,backgroundColor:'rgba(229,25,44,.07)',borderWidth:1.5,pointRadius:3,fill:true,tension:.3,spanGaps:true},
        {label:'2026',data:trend.map(t=>r1(t.u26)),borderColor:c26,backgroundColor:CUR_CAT==='HOGAR'?'rgba(102,153,255,.07)':'rgba(245,200,0,.07)',borderWidth:2,pointRadius:3,fill:true,tension:.3,spanGaps:true}
      ]
    },options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,ticks:{...baseOpts.scales.y.ticks,callback:v=>v+'K'}}}}});
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SEGMENTOS PAGE
// ─────────────────────────────────────────────────────────────────────────────
function renderSegmentos(){
  const segs=getSegs();
  const ac=accentColor();
  const t=getTotals();

  // Kstrip
  const items=[
    ['Valor Cat',fmtM(t.v26),t.varV],
    ['VAR% Val',sg(t.varV)+t.varV.toFixed(1)+'%',t.varV],
    ['Unds Cat',fmtK(t.u26),t.varU],
    ['VAR% Unds',sg(t.varU)+t.varU.toFixed(1)+'%',t.varU],
    ['Segmentos',''+segs.length,0],
    ['DDI Global',ddiLabel(t.ddi),t.ddi===null?0:t.ddi<30?-1:t.ddi<60?0.1:1],
  ];
  document.getElementById('s-kstrip').innerHTML=items.map(it=>{
    const cls=it[2]>0?'pos':it[2]<0?'neg':'acc';
    return`<div class="ks-item"><div class="ks-label">${it[0]}</div><div class="ks-val ${cls}">${it[1]}</div></div>`;
  }).join('');

  // Segment list
  document.getElementById('s-count').textContent=segs.length+' segs';
  document.getElementById('s-seg-list').innerHTML=segs.map((s,i)=>{
    const isSel=selSeg===s.seg;
    return`<div class="seg-row${isSel?' sel':''}" onclick="selectSeg('${s.seg.replace(/'/g,"\\'")}')">
      <span style="font-family:var(--fm);font-size:9px;color:var(--muted);width:20px;text-align:right;flex-shrink:0">${i+1}</span>
      <span class="seg-name" title="${s.seg}">${s.seg}</span>
      <span class="seg-v26" style="color:${ac}">${fmtM(s.v26)}</span>
      <span class="seg-var ${s.var>=0?'pos':'neg'}">${sg(s.var)}${s.var.toFixed(1)}%</span>
    </div>`;
  }).join('');

  if(selSeg) renderSegDetail(selSeg);
  else showSegEmpty();
}

function selectSeg(seg){
  selSeg=seg;
  // Re-highlight
  document.querySelectorAll('.seg-row').forEach(r=>{
    const n=r.querySelector('.seg-name')?.textContent;
    r.classList.toggle('sel',n===seg);
  });
  renderSegDetail(seg);
}

function showSegEmpty(){
  document.getElementById('s-r-title').textContent='Selecciona un segmento';
  document.getElementById('s-r-kpis').innerHTML='';
  document.getElementById('s-tbl').innerHTML=`<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--fm);font-size:9px;letter-spacing:2px;">SELECCIONA UN SEGMENTO</div>`;
}

function renderSegDetail(seg){
  const ac=accentColor();
  // Get monthly breakdown for this segment
  const meses=MES_ORD.filter(m=>D26.some(r=>r.MES===m));
  const rows=meses.map(m=>{
    const r26=D26.filter(r=>r.MES===m&&r.SEGMENTO===seg&&(CUR_CAT==='TOTAL'||r.CATEGORIA===CUR_CAT));
    const r25=D25.filter(r=>r.MES===m&&r.SEGMENTO===seg&&(CUR_CAT==='TOTAL'||r.CATEGORIA===CUR_CAT));
    const v26=r26.reduce((s,r)=>s+(r.VENTA||0),0);
    const v25=r25.reduce((s,r)=>s+(r.VENTA||0),0);
    const u26=r26.reduce((s,r)=>s+(r.UNIDADES||0),0);
    const u25=r25.reduce((s,r)=>s+(r.UNIDADES||0),0);
    const inv=r26.reduce((s,r)=>s+(r.INVENTARIO||0),0);
    const ddi=u26>0?calcDDI(inv,u26):null;
    const varV=sp(v26,v25||1), varU=sp(u26,u25||1);
    const isN=varV<-5;
    const ddiCls=ddiColor(ddi);
    return{m,v26,v25,u26,u25,inv,varV,varU,ddi,isN};
  }).filter(r=>r.v26>0||r.v25>0);

  // Totals
  const tv26=rows.reduce((s,r)=>s+r.v26,0);
  const tv25=rows.reduce((s,r)=>s+r.v25,0);
  const tu26=rows.reduce((s,r)=>s+r.u26,0);
  const tu25=rows.reduce((s,r)=>s+r.u25,0);
  const tinv=rows.reduce((s,r)=>s+r.inv,0);
  const tvarV=sp(tv26,tv25||1);
  const ddiTotal=tu26>0?calcDDI(tinv,tu26):null;

  document.getElementById('s-r-title').textContent='📦 '+seg;
  document.getElementById('s-r-kpis').innerHTML=`
    <span style="color:${ac};font-family:var(--fm);font-size:10px;font-weight:600">${fmtM(tv26)}</span>
    <span class="pill ${tvarV>=0?'pos':'neg'}">${sg(tvarV)}${tvarV.toFixed(1)}%</span>
    <span class="ddi ${ddiColor(ddiTotal)}" style="font-size:10px">📦 ${ddiLabel(ddiTotal)}</span>`;

  const rowHTML=rows.map(r=>`<tr class="${r.isN?'nr':''}">
    <td class="mono" style="color:${ac};font-weight:700">${MES_LABEL[r.m]||r.m}</td>
    <td class="mono" style="text-align:right;font-weight:700;color:${ac}">${fmtM(r.v26)}</td>
    <td class="mono" style="text-align:right;color:var(--muted)">${fmtM(r.v25)}</td>
    <td class="mono" style="text-align:right;color:${r.v26-r.v25>=0?'var(--pos)':'var(--neg)'}">${sg(r.v26-r.v25)}${fmtM(r.v26-r.v25)}</td>
    <td style="text-align:center"><span class="pill ${r.varV>=0?'pos':'neg'}">${sg(r.varV)}${r.varV.toFixed(1)}%</span></td>
    <td class="mono" style="text-align:right;color:var(--sub)">${fmtK(r.u26)}</td>
    <td style="text-align:center"><span class="pill ${r.varU>=0?'pos':'neg'}">${sg(r.varU)}${r.varU.toFixed(1)}%</span></td>
    <td class="mono" style="text-align:right;color:var(--sub)">${fmtM(r.inv)}</td>
    <td style="text-align:center"><span class="ddi ${ddiColor(r.ddi)}">${ddiLabel(r.ddi)}</span></td>
  </tr>`).join('');

  document.getElementById('s-tbl').innerHTML=`<table>
    <thead><tr>
      <th style="width:50px">MES</th>
      <th style="text-align:right">VALOR 2026</th>
      <th style="text-align:right">VALOR 2025</th>
      <th style="text-align:right">DIF $</th>
      <th style="text-align:center">VAR%</th>
      <th style="text-align:right">UNDS 2026</th>
      <th style="text-align:center">VAR% U</th>
      <th style="text-align:right">INVENTARIO</th>
      <th style="text-align:center">DDI</th>
    </tr></thead>
    <tbody>${rowHTML}</tbody>
  </table>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
