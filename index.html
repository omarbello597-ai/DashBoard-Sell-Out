<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Category Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

h1{
  color:#FFD700;
  margin-top:30px;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:50px;
  gap:40px;
}

.box{
  border:2px dashed #444;
  padding:30px;
  width:200px;
  border-radius:10px;
}

.ok{
  border-color:#00ff9c;
}

.check{
  font-size:30px;
  color:#00ff9c;
}

.status{
  margin-top:20px;
  color:#00ff9c;
}

#dashboard{
  display:none;
  margin-top:40px;
}

.kpis{
  display:flex;
  justify-content:center;
  gap:40px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:200px;
}

</style>
</head>

<body>

<h1>CATEGORY MANAGEMENT</h1>

<div id="loader">

<div class="container">

  <div class="box ok">
    <div class="check">✔</div>
    <p>EXCEL 2026</p>
    <small id="rows2026">Cargando...</small>
  </div>

  <div class="box ok">
    <div class="check">✔</div>
    <p>EXCEL 2025</p>
    <small id="rows2025">Cargando...</small>
  </div>

  <div class="box ok">
    <div class="check">✔</div>
    <p>INVENTARIO</p>
    <small>Integrado</small>
  </div>

</div>

<div class="status" id="status"></div>

</div>

<div id="dashboard">

  <h2 style="color:#00ff9c;">Dashboard listo 🚀</h2>

  <div class="kpis">
    <div class="card">
      <h3>Venta 2025</h3>
      <div id="kpi2025"></div>
    </div>

    <div class="card">
      <h3>Venta 2026</h3>
      <div id="kpi2026"></div>
    </div>

    <div class="card">
      <h3>Crecimiento</h3>
      <div id="kpiGrowth"></div>
    </div>
  </div>

</div>

<script>

let data25 = [];
let data26 = [];

async function cargarTodo(){

  const r25 = await fetch('resumen_2025.json');
  const r26 = await fetch('resumen_2026.json');

  data25 = await r25.json();
  data26 = await r26.json();

  // Simulación UI original
  document.getElementById("rows2025").innerText =
    data25.length.toLocaleString() + " filas cargadas";

  document.getElementById("rows2026").innerText =
    data26.length.toLocaleString() + " filas cargadas";

  document.getElementById("status").innerText =
    (data25.length + data26.length).toLocaleString() +
    " filas - listo";

  // KPIs
  const total25 = data25.reduce((a,b)=>a+(b.VENTA||0),0);
  const total26 = data26.reduce((a,b)=>a+(b.VENTA||0),0);

  const growth = ((total26 - total25)/total25)*100;

  document.getElementById("kpi2025").innerText =
    total25.toLocaleString();

  document.getElementById("kpi2026").innerText =
    total26.toLocaleString();

  document.getElementById("kpiGrowth").innerText =
    growth.toFixed(1) + "%";

  // transición automática
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("dashboard").style.display="block";
  }, 1500);

}

cargarTodo();

</script>

</body>
</html>
